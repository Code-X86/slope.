<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ttt">
    <h1>Tic Tac Toe</h1>
    <div class="modes">
      <button id="modePvP" class="mode on" type="button">Player vs Player</button>
      <button id="modePvAI" class="mode" type="button">Player vs AI</button>
    </div>
    <div class="difficulties" id="difficulties" style="display:none;">
      <button id="diffEasy" class="difficulty" type="button">Easy</button>
      <button id="diffMedium" class="difficulty on" type="button">Medium</button>
      <button id="diffHard" class="difficulty" type="button">Hard</button>
    </div>
    <div id="status">Player X's turn</div>
    <div id="board" class="board" role="grid" aria-label="Tic Tac Toe board"></div>
    <div class="controls">
      <button id="restart">Restart</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
