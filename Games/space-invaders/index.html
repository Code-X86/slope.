<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Space Invaders</title>
<style>:root{color-scheme:dark;--cyan:#34e8ff;--line:#263855;--muted:#8494ad}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden}body{display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 75%,#101c38,#02040b 65%);font-family:system-ui;color:white}main{width:min(100%,1050px);height:min(100%,780px);display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px}header,footer{display:flex;align-items:center;justify-content:space-between}.brand{font-size:27px;font-weight:950;color:var(--cyan);text-shadow:0 0 18px var(--cyan)}.stats{display:flex;gap:30px;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase}.stats b{display:block;color:white;text-align:center;font-size:15px}.board{position:relative;min-height:0;border:1px solid var(--line);border-radius:13px;overflow:hidden;background:#02050e}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;display:none;place-items:center;background:#02040cce;backdrop-filter:blur(6px)}.overlay.show{display:grid}.menu{width:min(90%,480px);padding:32px;border:1px solid var(--line);border-radius:15px;background:#070d1c;text-align:center}h1{margin:0;color:var(--cyan);font-size:52px;letter-spacing:-.07em}.menu p,footer span{color:var(--muted)}button{padding:11px 17px;border:1px solid var(--line);border-radius:8px;background:#0c1428;color:#aab5c8;font-weight:800;cursor:pointer}.primary{width:100%;background:var(--cyan);color:#031018;border-color:var(--cyan)}</style></head>
<body><main><header><div class="brand">SPACE INVADERS</div><div class="stats"><span>Score<b id="score">0</b></span><span>Wave<b id="wave">1</b></span><span>Lives<b id="lives">3</b></span></div></header><section class="board"><canvas id="canvas" width="960" height="600"></canvas><div class="overlay show" id="overlay"><div class="menu"><h1 id="title">Invaders</h1><p id="message">Destroy each wave before it reaches Earth.</p><button class="primary" id="start">Start game</button></div></div></section><footer><span>Move: A/D or arrows · Fire: Space · P pauses</span><button id="pause">Pause</button></footer></main>
<script>const c=document.querySelector("#canvas"),x=c.getContext("2d"),overlay=document.querySelector("#overlay");let ship,aliens,shots,enemyShots,score,wave,lives,dir,running=false,paused=false,keys=new Set(),last=performance.now(),enemyTimer=0;
function spawn(){aliens=[];for(let r=0;r<4+Math.min(wave,3);r++)for(let col=0;col<10;col++)aliens.push({x:145+col*68,y:70+r*48,w:36,h:24,alive:true});dir=1}
function start(){ship={x:450,y:550,w:55,h:18,cool:0};shots=[];enemyShots=[];score=0;wave=1;lives=3;spawn();running=true;paused=false;overlay.classList.remove("show");hud()}
function hud(){scoreEl.textContent=score;waveEl.textContent=wave;livesEl.textContent=lives}const scoreEl=document.querySelector("#score"),waveEl=document.querySelector("#wave"),livesEl=document.querySelector("#lives");
function finish(t,m){running=false;title.textContent=t;message.textContent=m;startBtn.textContent="Play again";overlay.classList.add("show")}
function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function update(dt){if(!running||paused)return;ship.x+=((keys.has("a")||keys.has("arrowleft")?-1:0)+(keys.has("d")||keys.has("arrowright")?1:0))*440*dt;ship.x=Math.max(0,Math.min(960-ship.w,ship.x));ship.cool-=dt;if(keys.has(" ")&&ship.cool<=0){shots.push({x:ship.x+25,y:ship.y-12,w:5,h:14});ship.cool=.22}shots.forEach(s=>s.y-=600*dt);enemyShots.forEach(s=>s.y+=260*dt);
let edge=false;aliens.filter(a=>a.alive).forEach(a=>{a.x+=dir*(35+wave*8)*dt;if(a.x<15||a.x+a.w>945)edge=true});if(edge){dir*=-1;aliens.filter(a=>a.alive).forEach(a=>a.y+=18)}
enemyTimer-=dt;if(enemyTimer<=0){const live=aliens.filter(a=>a.alive);if(live.length){const a=live[Math.floor(Math.random()*live.length)];enemyShots.push({x:a.x+16,y:a.y+a.h,w:5,h:14})}enemyTimer=Math.max(.3,1.25-wave*.08)}
shots.forEach(s=>aliens.forEach(a=>{if(a.alive&&hit(s,a)){a.alive=false;s.dead=true;score+=10*wave}}));enemyShots.forEach(s=>{if(hit(s,ship)){s.dead=true;lives--;hud();if(lives<=0)finish("Earth lost",`Score: ${score}`)}});shots=shots.filter(s=>s.y>-20&&!s.dead);enemyShots=enemyShots.filter(s=>s.y<620&&!s.dead);if(aliens.some(a=>a.alive&&a.y+a.h>=ship.y))finish("Earth lost",`Score: ${score}`);if(aliens.every(a=>!a.alive)){wave++;spawn();hud()}hud()}
function draw(){x.fillStyle="#02050e";x.fillRect(0,0,960,600);for(let i=0;i<90;i++){x.fillStyle=i%4?"#ffffff55":"#34e8ff88";x.fillRect((i*83)%960,(i*47)%600,1,1)}x.shadowBlur=16;x.shadowColor="#34e8ff";x.fillStyle="#bdf7ff";x.fillRect(ship?.x||450,ship?.y||550,ship?.w||55,ship?.h||18);aliens?.filter(a=>a.alive).forEach((a,i)=>{x.shadowColor=i%2?"#ff4fb8":"#8cff42";x.fillStyle=i%2?"#ff4fb8":"#8cff42";x.fillRect(a.x,a.y,a.w,a.h)});x.shadowBlur=0;x.fillStyle="#34e8ff";shots?.forEach(s=>x.fillRect(s.x,s.y,s.w,s.h));x.fillStyle="#ff5a68";enemyShots?.forEach(s=>x.fillRect(s.x,s.y,s.w,s.h))}
function loop(t){update(Math.min(.03,(t-last)/1000));last=t;draw();requestAnimationFrame(loop)}const title=document.querySelector("#title"),message=document.querySelector("#message"),startBtn=document.querySelector("#start");startBtn.onclick=start;document.querySelector("#pause").onclick=e=>{if(running){paused=!paused;e.target.textContent=paused?"Resume":"Pause"}};addEventListener("keydown",e=>{keys.add(e.key.toLowerCase());if([" ","arrowleft","arrowright"].includes(e.key.toLowerCase()))e.preventDefault();if(e.key.toLowerCase()==="p")document.querySelector("#pause").click()});addEventListener("keyup",e=>keys.delete(e.key.toLowerCase()));requestAnimationFrame(loop)</script></body></html>
