<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Play</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050a13;
      --panel: #0a111e;
      --panel-2: #101827;
      --line: #283447;
      --text: #f4f7fb;
      --muted: #91a0b6;
      --green: #a9ff32;
      --amber: #ffad0a;
      --accent: var(--green);
      --sidebar: 222px;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; overflow-x: hidden; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 78% 0%, rgba(18, 45, 77, .22), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button { font: inherit; }

    .app { min-height: 100vh; }

    .sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 5;
      width: var(--sidebar);
      display: flex;
      flex-direction: column;
      padding: 28px 16px 20px;
      border-right: 1px solid var(--line);
      background: rgba(4, 9, 18, .88);
      backdrop-filter: blur(18px);
    }

    .brand {
      margin: 3px 10px 36px;
      color: var(--text);
      font-size: 25px;
      font-weight: 900;
      letter-spacing: -.05em;
    }

    .brand span { color: var(--green); }

    .nav { display: grid; gap: 8px; }

    .nav-button {
      display: flex;
      align-items: center;
      gap: 13px;
      width: 100%;
      padding: 13px 14px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
    }

    .nav-button:hover, .nav-button.active {
      border-color: var(--line);
      background: var(--panel-2);
      color: var(--green);
    }

    .nav-button svg { width: 21px; height: 21px; }

    .side-note {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: auto 10px 0;
      color: #74839a;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .side-note span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 12px rgba(169, 255, 50, .7);
    }

    main {
      width: min(1400px, calc(100% - var(--sidebar)));
      margin-left: var(--sidebar);
      padding: 50px clamp(24px, 4vw, 64px) 56px;
    }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin: 0 0 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1;
      letter-spacing: -.045em;
    }

    .subtitle { margin: 11px 0 0; color: var(--muted); font-size: 16px; }
    .view-count { color: #718097; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; }

    .games {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
      margin-bottom: 34px;
    }

    .game-card {
      --card-accent: var(--green);
      position: relative;
      min-width: 0;
      overflow: hidden;
      border: 1px solid color-mix(in srgb, var(--card-accent) 72%, var(--line));
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 18px 45px rgba(0, 0, 0, .18);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .game-card[data-id="cybr"] { --card-accent: var(--amber); }

    .game-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 50px color-mix(in srgb, var(--card-accent) 12%, transparent);
    }

    .preview {
      position: relative;
      display: block;
      width: 100%;
      aspect-ratio: 16 / 8.3;
      overflow: hidden;
      border: 0;
      background: #020504;
      cursor: pointer;
    }

    .slope-art {
      background:
        radial-gradient(circle at 50% 77%, #061306 0 7%, transparent 7.5%),
        repeating-linear-gradient(90deg, transparent 0 9.5%, rgba(31, 255, 31, .32) 10%, transparent 10.5%),
        repeating-linear-gradient(0deg, transparent 0 13%, rgba(31, 255, 31, .28) 13.5%, transparent 14%),
        radial-gradient(ellipse at 50% 104%, rgba(34, 255, 28, .25), transparent 55%),
        #020603;
    }

    .slope-art::after {
      content: "";
      position: absolute;
      left: 44%;
      top: 56%;
      width: 12%;
      aspect-ratio: 1;
      border: 4px solid #37ff3a;
      border-radius: 50%;
      box-shadow: inset 0 0 18px #1cff2b, 0 0 22px rgba(49, 255, 55, .7);
      transform: rotate(25deg);
    }

    .cybr-art {
      background:
        linear-gradient(rgba(5, 4, 2, .15), rgba(5, 4, 2, .6)),
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(255, 174, 13, .09) 4px),
        radial-gradient(circle at 50% 60%, rgba(255, 166, 0, .45), transparent 37%),
        #160e02;
    }

    .cybr-art::before {
      content: "CYBR\A ARCADE";
      position: absolute;
      inset: 20% 18%;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 3px solid #9a6300;
      background: #080704;
      color: #ffd13a;
      font: 900 clamp(22px, 4vw, 48px)/.92 ui-monospace, monospace;
      letter-spacing: .08em;
      white-space: pre;
      text-align: center;
      text-shadow: 0 0 10px #ff9d00;
      box-shadow: 0 0 30px rgba(255, 153, 0, .35), inset 0 0 30px rgba(255, 153, 0, .16);
      transform: perspective(500px) rotateX(-5deg);
    }

    .card-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
    }

    .card-copy { min-width: 0; flex: 1; }
    .card-title { display: block; font-size: 18px; font-weight: 800; letter-spacing: -.02em; }
    .card-detail { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; }

    .icon-button {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .icon-button:hover, .icon-button.on {
      border-color: var(--card-accent, var(--green));
      color: var(--card-accent, var(--green));
    }

    .icon-button svg { width: 18px; height: 18px; }

    .play-button {
      border-color: var(--card-accent);
      color: var(--card-accent);
    }

    .player {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #03060b;
      box-shadow: 0 24px 70px rgba(0, 0, 0, .35);
    }

    .player[hidden] { display: none; }

    .player-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 9px 11px 9px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .player-title { margin-right: auto; font-size: 15px; font-weight: 800; }

    .tool-button {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 11px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .tool-button:hover { border-color: var(--line); background: #151f2e; color: var(--text); }
    .tool-button svg { width: 17px; height: 17px; }

    .stage { position: relative; height: min(68vh, 760px); min-height: 480px; background: #000; }
    .stage iframe { display: block; width: 100%; height: 100%; border: 0; background: #000; }

    .server-message {
      display: grid;
      place-items: center;
      min-height: 100%;
      padding: 30px;
      background: var(--bg);
      text-align: center;
    }

    .server-message div { max-width: 560px; }
    .server-message h2 { margin: 0 0 12px; font-size: 25px; }
    .server-message p { margin: 0 0 18px; color: var(--muted); line-height: 1.6; }
    .server-message code {
      display: block;
      padding: 13px 16px;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: var(--panel-2);
      color: var(--green);
      font: 13px/1.5 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-align: left;
      white-space: nowrap;
    }

    .empty {
      display: none;
      padding: 56px 20px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
    }

    .empty.show { display: block; }

    @media (max-width: 900px) {
      :root { --sidebar: 0px; }
      .sidebar {
        position: sticky;
        inset: 0;
        width: 100%;
        height: auto;
        flex-direction: row;
        align-items: center;
        padding: 10px 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .brand { margin: 0 auto 0 0; font-size: 20px; }
      .nav { display: flex; }
      .nav-button { width: auto; padding: 9px; }
      .nav-button span, .side-note { display: none; }
      main { width: 100%; margin: 0; padding: 30px 18px 36px; }
    }

    @media (max-width: 680px) {
      .games { width: calc(100% - 18px); grid-template-columns: minmax(0, 1fr); gap: 16px; }
      .game-card { width: 100%; max-width: 100%; }
      .card-bar { padding-right: 34px; }
      .page-head { align-items: start; flex-direction: column; }
      .tool-button span { display: none; }
      .tool-button { padding: 9px; }
      .stage { min-height: 420px; height: 72vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">MINI <span>PLAY</span></div>
      <nav class="nav" aria-label="Game browser">
        <button class="nav-button active" data-view="library" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9h12a4 4 0 0 1 3.8 5.3l-1.4 4.2a2 2 0 0 1-3.1 1l-2.1-1.5H8.8l-2.1 1.5a2 2 0 0 1-3.1-1l-1.4-4.2A4 4 0 0 1 6 9Z"/><path d="M8 13v4m-2-2h4m7-1h.01M15 16h.01M8 9l1-3h6l1 3"/></svg>
          <span>Library</span>
        </button>
        <button class="nav-button" data-view="favorites" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-2.9-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"/></svg>
          <span>Favorites</span>
        </button>
      </nav>
      <div class="side-note"><span></span>Ready to play</div>
    </aside>

    <main>
      <header class="page-head">
        <div>
          <h1 id="heading">Game Library</h1>
          <p class="subtitle" id="subtitle">Pick a game and jump in.</p>
        </div>
        <div class="view-count" id="viewCount">2 games</div>
      </header>

      <section class="games" id="games" aria-label="Games">
        <article class="game-card" data-id="slope">
          <button class="preview slope-art launch" type="button" aria-label="Play Slope"></button>
          <div class="card-bar">
            <div class="card-copy">
              <span class="card-title">Slope</span>
              <span class="card-detail">Fast endless runner</span>
            </div>
            <button class="icon-button favorite" type="button" aria-label="Favorite Slope"></button>
            <button class="icon-button play-button launch" type="button" aria-label="Play Slope"></button>
          </div>
        </article>

        <article class="game-card" data-id="cybr">
          <button class="preview cybr-art launch" type="button" aria-label="Play CYBR Arcade"></button>
          <div class="card-bar">
            <div class="card-copy">
              <span class="card-title">CYBR Arcade</span>
              <span class="card-detail">A collection of quick arcade games</span>
            </div>
            <button class="icon-button favorite" type="button" aria-label="Favorite CYBR Arcade"></button>
            <button class="icon-button play-button launch" type="button" aria-label="Play CYBR Arcade"></button>
          </div>
        </article>
      </section>

      <div class="empty" id="empty">No favorites yet. Use the star on a game to add one.</div>

      <section class="player" id="player" hidden aria-label="Game player">
        <div class="player-bar">
          <strong class="player-title" id="playerTitle"></strong>
          <button class="tool-button" id="backButton" type="button" aria-label="Close game">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg><span>Back</span>
          </button>
          <button class="tool-button" id="reloadButton" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11a8 8 0 1 0 1 4m-1-4V5m0 6h-6"/></svg><span>Reload</span>
          </button>
          <button class="tool-button" id="fullscreenButton" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H3v5m13-5h5v5M8 21H3v-5m13 5h5v-5"/></svg><span>Fullscreen</span>
          </button>
        </div>
        <div class="stage" id="stage"></div>
      </section>
    </main>
  </div>

  <script>
    const games = {
      slope: { title: "Slope", src: "slope/index.html" },
      cybr: { title: "CYBR Arcade", src: "refrence/cybr-arcade.html" }
    };
    const star = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2-5.6-2.9-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"/></svg>';
    const play = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m8 5 11 7-11 7V5Z"/></svg>';
    const favorites = new Set(JSON.parse(localStorage.getItem("mini-play-favorites") || "[]"));
    const cards = [...document.querySelectorAll(".game-card")];
    const player = document.querySelector("#player");
    const stage = document.querySelector("#stage");
    const playerTitle = document.querySelector("#playerTitle");
    let currentGame = null;
    let activeView = "library";

    document.querySelectorAll(".favorite").forEach(button => button.innerHTML = star);
    document.querySelectorAll(".play-button").forEach(button => button.innerHTML = play);

    function updateView() {
      let visible = 0;
      cards.forEach(card => {
        const show = activeView === "library" || favorites.has(card.dataset.id);
        card.hidden = !show;
        card.querySelector(".favorite").classList.toggle("on", favorites.has(card.dataset.id));
        if (show) visible++;
      });
      document.querySelector("#heading").textContent = activeView === "library" ? "Game Library" : "Favorites";
      document.querySelector("#subtitle").textContent = activeView === "library" ? "Pick a game and jump in." : "Your saved games, ready to launch.";
      document.querySelector("#viewCount").textContent = `${visible} game${visible === 1 ? "" : "s"}`;
      document.querySelector("#empty").classList.toggle("show", activeView === "favorites" && visible === 0);
      document.querySelectorAll(".nav-button").forEach(button => button.classList.toggle("active", button.dataset.view === activeView));
    }

    function launch(id) {
      currentGame = id;
      const game = games[id];
      playerTitle.textContent = game.title;
      stage.replaceChildren();
      if (id === "slope" && location.protocol === "file:") {
        stage.innerHTML = '<div class="server-message"><div><h2>Slope needs a local server</h2><p>Browsers block Unity build files when this page is opened directly from disk. Run this command in the website folder, then open <strong>http://localhost:8000</strong>.</p><code>python3 -m http.server 8000</code></div></div>';
        player.hidden = false;
        player.scrollIntoView({ behavior: "smooth", block: "start" });
        return;
      }
      const frame = document.createElement("iframe");
      frame.src = game.src;
      frame.title = game.title;
      frame.setAttribute("allowfullscreen", "");
      frame.setAttribute("sandbox", "allow-scripts allow-same-origin");
      stage.append(frame);
      player.hidden = false;
      player.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    cards.forEach(card => {
      card.querySelectorAll(".launch").forEach(button => button.addEventListener("click", () => launch(card.dataset.id)));
      card.querySelector(".favorite").addEventListener("click", () => {
        favorites.has(card.dataset.id) ? favorites.delete(card.dataset.id) : favorites.add(card.dataset.id);
        localStorage.setItem("mini-play-favorites", JSON.stringify([...favorites]));
        updateView();
      });
    });

    document.querySelectorAll(".nav-button").forEach(button => button.addEventListener("click", () => {
      activeView = button.dataset.view;
      updateView();
    }));

    document.querySelector("#backButton").addEventListener("click", () => {
      player.hidden = true;
      stage.replaceChildren();
      currentGame = null;
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    document.querySelector("#reloadButton").addEventListener("click", () => {
      const frame = stage.querySelector("iframe");
      if (frame) frame.src = games[currentGame].src;
    });

    document.querySelector("#fullscreenButton").addEventListener("click", async () => {
      if (!document.fullscreenElement) await player.requestFullscreen();
      else await document.exitFullscreen();
    });

    updateView();
    const linkedGame = location.hash.slice(1);
    if (games[linkedGame]) launch(linkedGame);
  </script>
</body>
</html>
