<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Paint - Draw in Your Browser | Joe Heyming 🎨</title>

    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>"
    />

    <meta
      name="description"
      content="A free browser paint app. Draw and sketch with pencil, shapes, fill, layers, lasso, magic wand, and selection tools — then export PNG, JPEG, or a project file."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#FAFAFA" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Joe Heyming" />
    <meta property="og:title" content="🎨 Paint - Draw in Your Browser" />
    <meta
      property="og:description"
      content="MS Paint-inspired canvas app with layers, selection, zoom, lasso, magic wand, and export to PNG, JPEG, or project files."
    />
    <meta property="og:url" content="https://joeheyming.github.io/paint/" />
    <meta property="og:image" content="https://joeheyming.github.io/paint/paint-preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@joeheyming" />
    <meta name="twitter:title" content="🎨 Paint - Draw in Your Browser" />
    <meta
      name="twitter:description"
      content="Free browser paint app with layers, selection tools, zoom, fill, and export to PNG, JPEG, or project files."
    />
    <meta name="twitter:image" content="https://joeheyming.github.io/paint/paint-preview.png" />

    <link rel="canonical" href="https://joeheyming.github.io/paint/" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "Paint",
            "alternateName": [
              "Browser Paint",
              "MS Paint clone",
              "Online paint app",
              "Free browser paint",
              "Web paint",
              "HTML5 paint"
            ],
            "url": "https://joeheyming.github.io/paint/",
            "applicationCategory": "DesignApplication",
            "operatingSystem": "Web Browser",
            "description": "A free MS-Paint-style raster drawing app in your browser. Pencil, brush, eraser, fill, line, rectangle, ellipse, picker, and selection tools. Export PNG; nothing is uploaded.",
            "author": { "@type": "Person", "name": "Joe Heyming", "url": "https://joeheyming.github.io/about/" },
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          },
          {
            "@type": "FAQPage",
            "mainEntity": [
              {
                "@type": "Question",
                "name": "What tools are included?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Pencil (1px), brush (variable width), eraser, fill bucket, line, rectangle (filled or outlined), ellipse (filled or outlined), colour picker, and rectangular selection. The toolbox layout deliberately echoes the original Microsoft Paint."
                }
              },
              {
                "@type": "Question",
                "name": "Can I export my drawing?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes — the canvas exports to PNG via the standard browser download flow. Nothing is uploaded; the PNG is encoded in your browser using canvas.toBlob."
                }
              },
              {
                "@type": "Question",
                "name": "Does it support pressure-sensitive styluses?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Pointer Events expose pressure for compatible styluses (Apple Pencil, Wacom, Surface Pen) — the brush tool varies its width with pressure on supported devices. Mouse and touch fall back to a constant width."
                }
              },
              {
                "@type": "Question",
                "name": "Is there an undo?",
                "acceptedAnswer": {
                  "@type": "Answer",
                  "text": "Yes — Ctrl/Cmd+Z undoes; Ctrl/Cmd+Shift+Z (or Ctrl+Y) redoes. The history is bounded to keep memory in check."
                }
              }
            ]
          }
        ]
      }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Q62Q3E20Y0"></script>
    <script>
      (function () {
        var m = window.matchMedia;
        if (
          (m && m('(display-mode: standalone)').matches) ||
          (m && m('(display-mode: fullscreen)').matches) ||
          (m && m('(display-mode: minimal-ui)').matches) ||
          window.navigator.standalone === true ||
          (document.referrer || '').indexOf('android-app://') === 0
        ) {
          window.backButtonInitialized = true;
          document.documentElement.classList.add('pwa-standalone');
          var s = document.createElement('style');
          s.textContent = '.back-to-portfolio{display:none!important}';
          document.head.appendChild(s);
        }
      })();
    </script>
    <!-- Site chrome scripts from the upstream page are intentionally omitted
         in this static mini-browser build. -->

    <link rel="stylesheet" href="style.css" />

    <!-- Heyming OS brand foundation -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500;600&display=optional"
    />
  </head>
  <body>
    <div class="paint-layout">
      <!-- ── Toolbar ── -->
      <header class="paint-header" role="toolbar" aria-label="Paint tools">
        <h1 class="paint-title-wrap">
          <a href="/" class="paint-title" aria-label="Paint — back to portfolio">
            <span aria-hidden="true">🎨</span>
            <span>Paint</span>
          </a>
        </h1>
        <p class="paint-seo-intro">
          Free browser drawing app with layers, shapes, fill, and selection tools.
        </p>

        <div class="header-sep" aria-hidden="true"></div>

        <div id="tool-options" class="tool-options" aria-label="Tool options"></div>

        <div class="header-sep" aria-hidden="true"></div>

        <div class="zoom-group" aria-label="Zoom controls">
          <button class="zoom-btn" id="btn-zoom-out" title="Zoom out (-)">−</button>
          <span id="zoom-display">100%</span>
          <button class="zoom-btn" id="btn-zoom-in" title="Zoom in (+)">+</button>
          <button
            class="zoom-btn"
            id="btn-zoom-reset"
            title="Reset zoom (0)"
            style="font-size: 10px"
          >
            1:1
          </button>
        </div>

        <div class="action-group">
          <div class="action-menu" id="file-menu-wrap">
            <button
              class="action-btn"
              id="btn-file"
              title="File"
              aria-label="File menu"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <span class="btn-icon" aria-hidden="true">📁</span>
              <span>File</span>
              <span class="action-caret" aria-hidden="true">▾</span>
            </button>
            <div class="action-menu-list hidden" id="file-menu-list" role="menu">
              <button class="action-menu-item" data-file="new">New</button>
              <div class="action-menu-sep"></div>
              <button class="action-menu-item" data-file="open-computer">
                Open from Computer…
              </button>
              <!-- Open from OS injected here by initOSBridge() -->
              <div class="action-menu-sep"></div>
              <div class="action-menu-item has-submenu" role="menuitem" aria-haspopup="true">
                Export
                <div class="action-submenu" role="menu">
                  <button class="action-menu-item" data-file="save-png">PNG image</button>
                  <button class="action-menu-item" data-file="save-jpeg">JPEG image</button>
                  <div class="action-menu-sep"></div>
                  <button class="action-menu-item" data-file="save-project">
                    Paint project (.paintproj)
                  </button>
                </div>
              </div>
              <!-- Save to OS submenu injected here by initOSBridge() -->
            </div>
          </div>
          <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)" aria-label="Undo" disabled>
            <span class="btn-icon" aria-hidden="true">↩</span>
            <span>Undo</span>
          </button>
          <button class="action-btn" id="btn-redo" title="Redo (Ctrl+Y)" aria-label="Redo" disabled>
            <span class="btn-icon" aria-hidden="true">↪</span>
            <span>Redo</span>
          </button>
          <button
            class="action-btn"
            id="btn-resize"
            title="Resize canvas"
            aria-label="Resize canvas"
          >
            <span class="btn-icon" aria-hidden="true">⇲</span>
            <span>Resize</span>
          </button>
          <div class="action-menu" id="adjust-menu-wrap">
            <button
              class="action-btn"
              id="btn-adjust"
              title="Image adjustments"
              aria-label="Adjust"
              aria-haspopup="true"
              aria-expanded="false"
            >
              <span class="btn-icon" aria-hidden="true">🎚</span>
              <span>Adjust</span>
              <span class="action-caret" aria-hidden="true">▾</span>
            </button>
            <div class="action-menu-list hidden" id="adjust-menu-list" role="menu"></div>
          </div>
          <button
            class="action-btn danger"
            id="btn-clear"
            title="Clear active layer"
            aria-label="Clear"
          >
            <span class="btn-icon" aria-hidden="true">🗑️</span>
            <span>Clear</span>
          </button>
        </div>

        <input
          type="file"
          id="upload-input"
          class="hidden-file"
          accept="image/*,.paintproj,application/json"
          aria-label="Upload image or project"
        />
      </header>

      <!-- ── Canvas + panels ── -->
      <div class="paint-body">
        <!-- Left tool panel -->
        <aside class="left-panel" aria-label="Tools">
          <div id="tool-buttons" role="group" aria-label="Drawing tools"></div>
        </aside>

        <div id="canvas-area" aria-label="Drawing canvas">
          <div class="canvas-stack" id="canvas-stack">
            <!-- Layer canvases inserted here by JS -->
            <canvas id="overlay-canvas" role="img" aria-label="Draw here"></canvas>
          </div>
          <!-- Text tool input -->
          <textarea id="text-input" rows="1" aria-label="Type text to add"></textarea>
        </div>

        <!-- Drag handle between canvas and right panel -->
        <div class="panel-resize-handle" id="panel-resize-handle" aria-hidden="true"></div>

        <!-- Persistent right panel: Layers + History -->
        <aside class="right-panel" aria-label="Panels">
          <div class="panel-section expanded" id="section-layers">
            <div class="panel-section-header" role="button" tabindex="0" aria-expanded="true">
              <span>Layers</span>
              <span class="panel-chevron" aria-hidden="true">▾</span>
            </div>
            <div class="panel-section-body">
              <div id="layer-list-container"></div>
            </div>
          </div>
          <div class="panel-section" id="section-history">
            <div class="panel-section-header" role="button" tabindex="0" aria-expanded="true">
              <span>History</span>
              <span class="panel-chevron" aria-hidden="true">▾</span>
            </div>
            <div class="panel-section-body">
              <div id="history-list-container"></div>
            </div>
          </div>
        </aside>
      </div>

      <!-- ── Palette bar ── -->
      <div class="palette-bar-outer" role="region" aria-label="Color palette">
        <div id="palette-bar"></div>
        <div class="status-bar">
          <span id="status-coords" aria-live="polite" aria-atomic="true">0, 0</span>
        </div>
      </div>
    </div>

    <!-- ── Adjust modal ── -->
    <div
      id="adjust-modal"
      class="modal hidden"
      role="dialog"
      aria-label="Adjustment"
      aria-modal="true"
    >
      <div class="modal-box">
        <h2 id="adjust-modal-title">Adjust</h2>
        <div id="adjust-modal-fields"></div>
        <div class="modal-buttons">
          <button class="modal-btn secondary" id="adjust-cancel">Cancel</button>
          <button class="modal-btn primary" id="adjust-ok">Apply</button>
        </div>
      </div>
    </div>

    <!-- ── Filename modal ── -->
    <div
      id="filename-modal"
      class="modal hidden"
      role="dialog"
      aria-label="Save file"
      aria-modal="true"
    >
      <div class="modal-box">
        <h2 id="filename-modal-title">Save As</h2>
        <div class="modal-row">
          <label for="filename-input">Filename</label>
          <input
            type="text"
            id="filename-input"
            value="untitled.png"
            autocomplete="off"
            spellcheck="false"
            aria-label="Filename"
          />
        </div>
        <div class="modal-buttons">
          <button class="modal-btn secondary" id="filename-cancel">Cancel</button>
          <button class="modal-btn primary" id="filename-ok">Download</button>
        </div>
      </div>
    </div>

    <!-- ── Resize modal ── -->
    <div
      id="resize-modal"
      class="modal hidden"
      role="dialog"
      aria-label="Resize canvas"
      aria-modal="true"
    >
      <div class="modal-box">
        <h2>Resize Canvas</h2>
        <div class="modal-row">
          <label for="resize-w">Width</label>
          <input
            type="number"
            id="resize-w"
            min="1"
            max="8000"
            value="800"
            aria-label="Canvas width in pixels"
          />
          <span style="color: var(--fg-dim); font-size: 12px">px</span>
        </div>
        <div class="modal-row">
          <label for="resize-h">Height</label>
          <input
            type="number"
            id="resize-h"
            min="1"
            max="8000"
            value="600"
            aria-label="Canvas height in pixels"
          />
          <span style="color: var(--fg-dim); font-size: 12px">px</span>
        </div>
        <div class="modal-buttons">
          <button class="modal-btn secondary" id="resize-cancel">Cancel</button>
          <button class="modal-btn primary" id="resize-ok">Resize</button>
        </div>
      </div>
    </div>

    <script type="module" src="paint.js"></script>
  </body>
</html>
