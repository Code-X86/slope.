<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen MP3 Visualizer</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      user-select: none;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #050505;
      color: white;
    }

    .player {
      width: 100vw;
      height: 100vh;
      background: #0b0b0b;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .visual-area {
      flex: 1;
      min-height: 0;
      position: relative;
      background:
        radial-gradient(circle at top, rgba(47, 128, 237, 0.25), transparent 45%),
        linear-gradient(180deg, #080808, #111);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .track-info {
      position: absolute;
      top: 22px;
      left: 22px;
      right: 22px;
      padding: 14px 18px;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      color: #ddd;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 5;
    }

    .mode-name {
      position: absolute;
      bottom: 24px;
      left: 24px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #aaa;
      font-size: 13px;
      z-index: 5;
    }

    .controls {
      height: 205px;
      padding: 18px 30px;
      background: rgba(15, 15, 15, 0.97);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .main-controls {
      display: flex;
      gap: 12px;
    }

    button,
    .upload-btn {
      border: none;
      background: #242424;
      color: white;
      border-radius: 14px;
      height: 46px;
      min-width: 50px;
      font-size: 20px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: 0.15s;
    }

    button:hover,
    .upload-btn:hover {
      background: #303030;
      transform: translateY(-1px);
    }

    button:active,
    .upload-btn:active {
      transform: scale(0.96);
    }

    .upload-btn {
      flex: 1;
      font-size: 21px;
    }

    input[type="file"] {
      display: none;
    }

    .slider-box {
      display: grid;
      grid-template-columns: 34px 1fr 64px;
      align-items: center;
      gap: 12px;
      color: #aaa;
      font-size: 13px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #2f80ed;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 12px;
      margin-top: -8px;
    }

    @media (max-width: 700px) {
      .controls {
        height: 245px;
        padding: 16px;
      }

      .main-controls {
        flex-wrap: wrap;
      }

      .upload-btn {
        flex-basis: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="player">
    <div class="visual-area">
      <div class="track-info" id="trackName">No MP3 loaded</div>
      <div class="mode-name" id="modeName">Mode 1: Bars</div>
      <canvas id="visualizer"></canvas>
    </div>

    <div class="controls">
      <div class="main-controls">
        <label class="upload-btn" title="Upload MP3">
          ⬆
          <input id="fileInput" type="file" accept="audio/mpeg,audio/mp3,audio/*">
        </label>

        <button id="playPause" title="Play / Pause">▶</button>
        <button id="stop" title="Stop">■</button>
        <button id="mute" title="Mute">🔊</button>
        <button id="pitchToggle" title="Pitch Preserve">♮</button>
        <button id="modeButton" title="Change Visual Mode">◈</button>
      </div>

      <div>
        <div class="slider-box">
          <span>⏱</span>
          <input id="progress" type="range" min="0" max="100" value="0">
          <span id="progressValue">0%</span>
        </div>

        <div class="time-row">
          <span id="currentTime">0:00</span>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div class="slider-box">
        <span>⚡</span>
        <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1">
        <span id="speedValue">1.00x</span>
      </div>

      <div class="slider-box">
        <span>🔉</span>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
        <span id="volumeValue">100%</span>
      </div>
    </div>
  </div>

  <audio id="audio"></audio>

  <script>
    const fileInput = document.getElementById("fileInput");
    const audio = document.getElementById("audio");
    const trackName = document.getElementById("trackName");
    const modeName = document.getElementById("modeName");

    const playPause = document.getElementById("playPause");
    const stopButton = document.getElementById("stop");
    const muteButton = document.getElementById("mute");
    const pitchToggle = document.getElementById("pitchToggle");
    const modeButton = document.getElementById("modeButton");

    const progress = document.getElementById("progress");
    const progressValue = document.getElementById("progressValue");
    const speed = document.getElementById("speed");
    const speedValue = document.getElementById("speedValue");
    const volume = document.getElementById("volume");
    const volumeValue = document.getElementById("volumeValue");

    const currentTimeText = document.getElementById("currentTime");
    const durationText = document.getElementById("duration");

    const canvas = document.getElementById("visualizer");
    const ctx = canvas.getContext("2d");

    let audioURL = null;
    let audioContext = null;
    let analyser = null;
    let source = null;
    let frequencyData = null;
    let timeData = null;

    let pitchPreserve = true;
    let mode = 0;
    let particles = [];

    const modes = [
      "Mode 1: Bars",
      "Mode 2: Waveform",
      "Mode 3: Circle",
      "Mode 4: Radial Spikes",
      "Mode 5: Mirror Bars",
      "Mode 6: Particles",
      "Mode 7: Tunnel",
      "Mode 8: Neon Rings"
    ];

    function resizeCanvas() {
      canvas.width = Math.floor(canvas.offsetWidth * devicePixelRatio);
      canvas.height = Math.floor(canvas.offsetHeight * devicePixelRatio);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      if (audioURL) URL.revokeObjectURL(audioURL);

      audioURL = URL.createObjectURL(file);
      audio.src = audioURL;
      trackName.textContent = file.name;

      progress.value = 0;
      progressValue.textContent = "0%";
      playPause.textContent = "▶";
    });

    playPause.addEventListener("click", async () => {
      if (!audio.src) {
        alert("Upload an MP3 first.");
        return;
      }

      setupAudio();

      if (audio.paused) {
        await audioContext.resume();
        await audio.play();
        playPause.textContent = "⏸";
      } else {
        audio.pause();
        playPause.textContent = "▶";
      }
    });

    stopButton.addEventListener("click", () => {
      audio.pause();
      audio.currentTime = 0;
      playPause.textContent = "▶";
    });

    muteButton.addEventListener("click", () => {
      audio.muted = !audio.muted;
      muteButton.textContent = audio.muted ? "🔇" : "🔊";
    });

    pitchToggle.addEventListener("click", () => {
      pitchPreserve = !pitchPreserve;

      audio.preservesPitch = pitchPreserve;
      audio.mozPreservesPitch = pitchPreserve;
      audio.webkitPreservesPitch = pitchPreserve;

      pitchToggle.textContent = pitchPreserve ? "♮" : "♭";
    });

    modeButton.addEventListener("click", () => {
      mode = (mode + 1) % modes.length;
      modeName.textContent = modes[mode];
    });

    speed.addEventListener("input", () => {
      audio.playbackRate = Number(speed.value);
      speedValue.textContent = Number(speed.value).toFixed(2) + "x";
    });

    volume.addEventListener("input", () => {
      audio.volume = Number(volume.value);
      volumeValue.textContent = Math.round(volume.value * 100) + "%";
    });

    progress.addEventListener("input", () => {
      if (!audio.duration) return;
      audio.currentTime = (progress.value / 100) * audio.duration;
    });

    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;

      const percent = (audio.currentTime / audio.duration) * 100;
      progress.value = percent;
      progressValue.textContent = Math.round(percent) + "%";

      currentTimeText.textContent = formatTime(audio.currentTime);
      durationText.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("loadedmetadata", () => {
      durationText.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("ended", () => {
      playPause.textContent = "▶";
    });

    function setupAudio() {
      if (audioContext) return;

      audioContext = new AudioContext();
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.82;

      source = audioContext.createMediaElementSource(audio);
      source.connect(analyser);
      analyser.connect(audioContext.destination);

      frequencyData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);
    }

    function getAverageBass() {
      if (!frequencyData) return 0;
      let sum = 0;
      const limit = Math.floor(frequencyData.length * 0.15);

      for (let i = 0; i < limit; i++) {
        sum += frequencyData[i];
      }

      return sum / limit / 255;
    }

    function drawBackground(w, h) {
      const gradient = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h));
      gradient.addColorStop(0, "#111827");
      gradient.addColorStop(0.45, "#090909");
      gradient.addColorStop(1, "#020202");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, w, h);
    }

    function drawVisualizer() {
      requestAnimationFrame(drawVisualizer);

      const w = canvas.width;
      const h = canvas.height;

      drawBackground(w, h);

      if (!analyser) {
        drawIdle(w, h);
        return;
      }

      analyser.getByteFrequencyData(frequencyData);
      analyser.getByteTimeDomainData(timeData);

      if (mode === 0) drawBars(w, h);
      if (mode === 1) drawWaveform(w, h);
      if (mode === 2) drawCircle(w, h);
      if (mode === 3) drawRadialSpikes(w, h);
      if (mode === 4) drawMirrorBars(w, h);
      if (mode === 5) drawParticles(w, h);
      if (mode === 6) drawTunnel(w, h);
      if (mode === 7) drawNeonRings(w, h);
    }

    function drawIdle(w, h) {
      const centerY = h / 2;
      const lines = 100;
      const step = w / lines;

      ctx.strokeStyle = "rgba(47, 128, 237, 0.5)";
      ctx.lineWidth = 3 * devicePixelRatio;
      ctx.beginPath();

      for (let i = 0; i < lines; i++) {
        const x = i * step;
        const y = centerY + Math.sin(i * 0.35 + Date.now() * 0.002) * 40 * devicePixelRatio;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();
    }

    function drawBars(w, h) {
      const bars = frequencyData.length;
      const barWidth = w / bars;
      const gap = 3 * devicePixelRatio;

      for (let i = 0; i < bars; i++) {
        const value = frequencyData[i] / 255;
        const barHeight = value * h * 0.78;
        const x = i * barWidth;
        const y = h - barHeight;

        const gradient = ctx.createLinearGradient(0, y, 0, h);
        gradient.addColorStop(0, "#88ccff");
        gradient.addColorStop(0.5, "#2f80ed");
        gradient.addColorStop(1, "#123a73");

        ctx.fillStyle = gradient;
        ctx.fillRect(x, y, Math.max(1, barWidth - gap), barHeight);
      }
    }

    function drawWaveform(w, h) {
      ctx.lineWidth = 4 * devicePixelRatio;
      ctx.strokeStyle = "#4da3ff";
      ctx.shadowBlur = 25 * devicePixelRatio;
      ctx.shadowColor = "#2f80ed";
      ctx.beginPath();

      const step = w / timeData.length;

      for (let i = 0; i < timeData.length; i++) {
        const x = i * step;
        const y = (timeData[i] / 255) * h;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }

      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawCircle(w, h) {
      const cx = w / 2;
      const cy = h / 2;
      const bass = getAverageBass();
      const radius = Math.min(w, h) * (0.18 + bass * 0.08);

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);

      const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 2);
      gradient.addColorStop(0, "rgba(47, 128, 237, 0.8)");
      gradient.addColorStop(1, "rgba(47, 128, 237, 0)");

      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.lineWidth = 6 * devicePixelRatio;
      ctx.strokeStyle = "#5fb1ff";
      ctx.stroke();
    }

    function drawRadialSpikes(w, h) {
      const cx = w / 2;
      const cy = h / 2;
      const baseRadius = Math.min(w, h) * 0.18;
      const bars = frequencyData.length;

      ctx.strokeStyle = "#2f80ed";
      ctx.lineWidth = 3 * devicePixelRatio;
      ctx.shadowBlur = 18 * devicePixelRatio;
      ctx.shadowColor = "#2f80ed";

      for (let i = 0; i < bars; i++) {
        const angle = (i / bars) * Math.PI * 2;
        const value = frequencyData[i] / 255;
        const inner = baseRadius;
        const outer = baseRadius + value * Math.min(w, h) * 0.32;

        const x1 = cx + Math.cos(angle) * inner;
        const y1 = cy + Math.sin(angle) * inner;
        const x2 = cx + Math.cos(angle) * outer;
        const y2 = cy + Math.sin(angle) * outer;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    }

    function drawMirrorBars(w, h) {
      const bars = frequencyData.length;
      const barWidth = w / bars;
      const centerY = h / 2;
      const gap = 3 * devicePixelRatio;

      for (let i = 0; i < bars; i++) {
        const value = frequencyData[i] / 255;
        const barHeight = value * h * 0.42;
        const x = i * barWidth;

        ctx.fillStyle = "#2f80ed";
        ctx.fillRect(x, centerY - barHeight, Math.max(1, barWidth - gap), barHeight);
        ctx.fillRect(x, centerY, Math.max(1, barWidth - gap), barHeight);
      }

      ctx.strokeStyle = "rgba(255,255,255,0.2)";
      ctx.beginPath();
      ctx.moveTo(0, centerY);
      ctx.lineTo(w, centerY);
      ctx.stroke();
    }

    function drawParticles(w, h) {
      const bass = getAverageBass();

      if (particles.length < 220 && bass > 0.12) {
        for (let i = 0; i < 5; i++) {
          particles.push({
            x: w / 2,
            y: h / 2,
            vx: (Math.random() - 0.5) * bass * 35 * devicePixelRatio,
            vy: (Math.random() - 0.5) * bass * 35 * devicePixelRatio,
            life: 1,
            size: (3 + Math.random() * 8) * devicePixelRatio
          });
        }
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.012;

        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = "#4da3ff";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (p.life <= 0) particles.splice(i, 1);
      }

      ctx.globalAlpha = 1;
    }

    function drawTunnel(w, h) {
      const cx = w / 2;
      const cy = h / 2;
      const bass = getAverageBass();
      const time = Date.now() * 0.001;

      ctx.lineWidth = 2.5 * devicePixelRatio;

      for (let i = 1; i < 18; i++) {
        const radius = i * Math.min(w, h) * 0.035 + bass * 70 * devicePixelRatio;
        const sides = 6;
        const rotation = time * 0.6 + i * 0.25;

        ctx.strokeStyle = `rgba(47, 128, 237, ${1 - i / 20})`;
        ctx.beginPath();

        for (let s = 0; s <= sides; s++) {
          const angle = rotation + (s / sides) * Math.PI * 2;
          const x = cx + Math.cos(angle) * radius;
          const y = cy + Math.sin(angle) * radius;

          if (s === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }

        ctx.stroke();
      }
    }

    function drawNeonRings(w, h) {
      const cx = w / 2;
      const cy = h / 2;
      const bass = getAverageBass();

      ctx.shadowBlur = 25 * devicePixelRatio;
      ctx.shadowColor = "#2f80ed";

      for (let i = 0; i < 8; i++) {
        const index = Math.floor((i / 8) * frequencyData.length);
        const value = frequencyData[index] / 255;
        const radius = Math.min(w, h) * (0.08 + i * 0.045) + value * 90 * devicePixelRatio + bass * 40 * devicePixelRatio;

        ctx.lineWidth = (2 + value * 8) * devicePixelRatio;
        ctx.strokeStyle = `rgba(77, 163, 255, ${0.9 - i * 0.08})`;

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    }

    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";

      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60).toString().padStart(2, "0");

      return mins + ":" + secs;
    }

    drawVisualizer();
  </script>

</body>
</html>
